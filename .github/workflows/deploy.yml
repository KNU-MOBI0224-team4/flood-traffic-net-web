name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-runs from the Actions tab

# Permissions the GITHUB_TOKEN needs to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Let one deploy finish before the next starts (don't cancel a live deploy)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        # Pages is already enabled (source = Actions); this just reads that config.
        # (We don't use enablement:true here — the workflow GITHUB_TOKEN isn't
        # permitted to *create* the Pages site under this org, so Pages was
        # enabled once via the REST API instead.)
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4